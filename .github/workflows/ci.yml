name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: macOS Apple Silicon
            os: macos-15
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned Rust toolchain
        run: rustup toolchain install

      - name: Confirm native Apple Silicon runner
        if: runner.os == 'macOS'
        shell: bash
        run: test "$(rustc --print host-tuple)" = "aarch64-apple-darwin"

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Run static checks and tests
        run: npm run verify

      - name: Validate the Tauri application build
        run: npm run tauri:build -- --debug --no-bundle
