name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (vMAJOR.MINOR.PATCH)
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: macOS Apple Silicon
            os: macos-15
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned Rust toolchain
        run: rustup toolchain install

      - name: Confirm native Apple Silicon runner
        if: runner.os == 'macOS'
        shell: bash
        run: test "$(rustc --print host-tuple)" = "aarch64-apple-darwin"

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Verify tag and source
        run: node scripts/check-version.mjs "${{ env.RELEASE_TAG }}"

      - name: Run static checks and tests
        run: npm run verify

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: windows-x64
          - name: macOS Apple Silicon
            os: macos-15
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75

    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install pinned Rust toolchain
        run: rustup toolchain install

      - name: Add Apple Silicon target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Build Windows installer
        if: runner.os == 'Windows'
        run: npm run tauri:build:windows

      - name: Build Apple Silicon app and DMG
        if: runner.os == 'macOS'
        # No --bundles override: the config targets are dmg AND app. Requesting
        # only dmg leaves no retained .app in bundle/macos to verify.
        run: npm run tauri:build:mac

      - name: Verify Apple Silicon application and DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app" || { echo "no .app produced under bundle/macos" >&2; exit 1; }
          binary="$(find "$app/Contents/MacOS" -maxdepth 1 -type f -print -quit)"
          dmg="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$binary" && test -n "$dmg"
          lipo -archs "$binary" | grep -qw arm64
          codesign --verify --deep --strict --verbose=2 "$app"
          hdiutil verify "$dmg"

      - name: Stage Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $files = @(Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *-setup.exe -File)
          if ($files.Count -eq 0) { throw "NSIS installer was not produced" }
          $files | Copy-Item -Destination release-assets

      - name: Stage macOS release asset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          files=(src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          (( ${#files[@]} > 0 )) || { echo "DMG was not produced" >&2; exit 1; }
          cp "${files[@]}" release-assets/

      - name: Upload staged release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish-draft:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download all platform assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate one checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          pushd release-assets >/dev/null
          mapfile -d '' files < <(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z)
          (( ${#files[@]} > 0 )) || { echo "No release assets found" >&2; exit 1; }
          sha256sum "${files[@]}" | sed 's#  \./#  #' > SHA256SUMS.txt
          popd >/dev/null

      - name: Create or refresh the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          release_notes=$'macOS artifact: native Apple Silicon (M1–M4), ad-hoc signed, not Apple-notarized.\nVerify the downloaded file against SHA256SUMS.txt before opening it.'

          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          (( ${#assets[@]} > 0 )) || { echo "No release assets found" >&2; exit 1; }

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
            test "$is_draft" = "true" || { echo "Refusing to overwrite a published release" >&2; exit 1; }
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --verify-tag \
              --draft \
              --title "TurboMerger $RELEASE_TAG" \
              --notes "$release_notes" \
              --generate-notes
          fi
