    <rect x="30" y="20" width="16" height="20" rx="2" />
    <rect x="82" y="20" width="16" height="20" rx="2" />
  </g>

  <!-- Lines on documents -->
  <g fill="none" stroke="#1a1a2e" stroke-width="1.5">
    <line x1="34" y1="26" x2="42" y2="26" />
    <line x1="34" y1="30" x2="42" y2="30" />
    <line x1="34" y1="34" x2="40" y2="34" />

    <line x1="86" y1="26" x2="94" y2="26" />
    <line x1="86" y1="30" x2="94" y2="30" />
    <line x1="86" y1="34" x2="92" y2="34" />
